<div class="container">
  <h1>Relationships</h1>
  <button mat-raised-button color="primary" [routerLink]="['new']"><mat-icon>add</mat-icon> Add Relationship</button>
  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="data" class="mat-elevation-z8">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>

      <ng-container matColumnDef="relationship_type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let element">
          <mat-icon style="vertical-align: middle; margin-right: 8px">{{ getRelIcon(element.relationship_type) }}</mat-icon>
          {{ element.relationship_type }}
        </td>
      </ng-container>

      <ng-container matColumnDef="from_id">
        <th mat-header-cell *matHeaderCellDef>From ID</th>
        <td mat-cell *matCellDef="let element">{{ element.from_id }}</td>
      </ng-container>

      <ng-container matColumnDef="to_id">
        <th mat-header-cell *matHeaderCellDef>To ID</th>
        <td mat-cell *matCellDef="let element">{{ element.to_id }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="warn" (click)="delete(element.id); $event.stopPropagation()">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row [routerLink]="['edit', row.id]" *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of relationships"> </mat-paginator>

  <router-outlet />
</div>
